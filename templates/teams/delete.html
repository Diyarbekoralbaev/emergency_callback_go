{{ define "title" }}Удалить бригаду{{ end }}

{{ define "content" }}
<h1 class="h3 mb-4">Удалить бригаду</h1>
<div class="card p-3">
    <p>Вы уверены, что хотите удалить бригаду <strong>{{ .Team.Name }}</strong>?</p>
    <p class="text-danger small">Это действие нельзя отменить.</p>
    <form method="post">
        {{ .CSRFField }}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{{ urlFor "teams:detail" .Team.ID }}" class="btn btn-link">Отмена</a>
    </form>
</div>
{{ end }}
