{{ define "title" }}Бригады{{ end }}

{{ define "content" }}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Бригады</h1>
    <a href="{{ urlFor "teams:create" }}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Новая бригада</a>
</div>

<form method="get" class="card mb-3 p-3">
    <div class="row g-2">
        <div class="col-md-4"><input type="text" name="search" class="form-control" placeholder="Поиск..." value="{{ .Search }}"></div>
        <div class="col-md-3">
            <select name="region" class="form-select">
                <option value="">Все регионы</option>
                {{ range .Regions }}<option value="{{ .ID }}" {{ if eq $.CurrentRegion .ID }}selected{{ end }}>{{ .Name }}</option>{{ end }}
            </select>
        </div>
        <div class="col-md-3">
            <div class="form-check mt-2"><input class="form-check-input" type="checkbox" name="show_inactive" value="1" {{ if .ShowInactive }}checked{{ end }}><label class="form-check-label">Показать неактивные</label></div>
        </div>
        <div class="col-md-2"><button class="btn btn-primary w-100">Фильтр</button></div>
    </div>
</form>

<div class="card p-3">
    <table class="table table-hover align-middle">
        <thead><tr><th>#</th><th>Название</th><th>Регион</th><th>Активна</th><th></th></tr></thead>
        <tbody>
        {{ range .Teams }}
            <tr>
                <td>{{ .ID }}</td>
                <td><strong>{{ .Name }}</strong></td>
                <td>{{ .RegionName }}</td>
                <td>{{ if .IsActive }}<span class="badge bg-success">Активна</span>{{ else }}<span class="badge bg-secondary">Неактивна</span>{{ end }}</td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" href="{{ urlFor "teams:detail" .ID }}"><i class="bi bi-eye"></i></a>
                    <a class="btn btn-sm btn-outline-warning" href="{{ urlFor "teams:edit" .ID }}"><i class="bi bi-pencil"></i></a>
                </td>
            </tr>
        {{ else }}
            <tr><td colspan="5" class="text-center text-muted py-4">Нет бригад</td></tr>
        {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
