<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahalaw</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:linear-gradient(135deg,#0d6efd,#0056b3); min-height:100vh; }
        .vote-card { max-width:480px; margin:2rem auto; }
        .star-btn { font-size:3rem; background:none; border:none; color:#dee2e6; transition:transform .15s; }
        .star-btn:hover, .star-btn.active { color:#ffc107; transform:scale(1.1); }
        .star-row { display:flex; justify-content:center; gap:.25rem; margin:1rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="vote-card card shadow-lg p-4">
            <div class="text-center mb-3">
                <i class="bi bi-telephone-fill text-primary fs-1"></i>
                <h4 class="mt-2">Tez medecinaliq xizmetin bahalaw</h4>
                <p class="text-muted small">Bizge ko'rsetilgen xizmetge baha beriń</p>
            </div>

            <form id="vote-form" method="post" action="{{ urlFor "callbacks:submit_vote" .Callback.VoteUUID }}">
                <div class="star-row" id="stars">
                    {{ range $i := .Range5 }}
                    <button type="button" class="star-btn" data-rating="{{ $i }}"><i class="bi bi-star-fill"></i></button>
                    {{ end }}
                </div>
                <input type="hidden" name="rating" id="rating-value" required>

                <div class="mb-3">
                    <label class="form-label">Pikir (qálese)</label>
                    <textarea name="comment" class="form-control" rows="3" maxlength="500" placeholder="Pikiriniz..."></textarea>
                </div>
                <button id="submit-btn" type="submit" class="btn btn-primary w-100" disabled>
                    <i class="bi bi-send"></i> Jiberiw
                </button>
                <div id="vote-error" class="text-danger small mt-2"></div>
            </form>
        </div>
    </div>
    <script>
    const stars = document.querySelectorAll('.star-btn');
    const ratingInput = document.getElementById('rating-value');
    const submitBtn = document.getElementById('submit-btn');
    let selected = 0;
    stars.forEach(b => {
        b.addEventListener('click', () => {
            selected = parseInt(b.dataset.rating, 10);
            ratingInput.value = selected;
            submitBtn.disabled = false;
            stars.forEach(s => {
                s.classList.toggle('active', parseInt(s.dataset.rating, 10) <= selected);
            });
        });
    });
    document.getElementById('vote-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        const fd = new FormData(e.target);
        const res = await fetch(e.target.action, { method: 'POST', body: fd });
        const data = await res.json().catch(()=>({}));
        if (data.success) {
            window.location.href = '{{ .ThanksURL }}';
        } else {
            document.getElementById('vote-error').textContent = data.error || 'Qátelik';
            submitBtn.disabled = false;
        }
    });
    </script>
</body>
</html>
